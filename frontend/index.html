<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flow — Gate Logbook</title>
    <meta name="description" content="Flow — RFID-based gate logbook system for students, vehicles, and visitors." />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  </head>
  <body class="text-slate-800 h-screen overflow-hidden flex flex-col font-sans selection:bg-blue-100" style="background:#f0f2f6">
    <!--
      Application shell.
      Everything dynamic is mounted by JS into the slots below:
        #space-canvas     — animated background (SpaceBackground)
        #nav-root         — top navigation tabs (NavBar)
        #app              — active page (Router)
        #snackbar-container — toast queue (Snackbar)
        #dialog-root      — modal dialogs are appended here at runtime
    -->
    <canvas id="space-canvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.9;"></canvas>

    <header id="nav-root" class="sticky top-4 z-20 flex justify-center w-full pointer-events-none"></header>

    <main id="app" class="flex-grow w-full max-w-6xl mx-auto p-4 md:p-6 overflow-hidden flex flex-col min-h-0 relative z-10 pt-6"></main>

    <div id="snackbar-container" class="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 z-50 flex flex-col gap-2 w-full max-w-sm px-4 pointer-events-none"></div>

    <div id="dialog-root"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
