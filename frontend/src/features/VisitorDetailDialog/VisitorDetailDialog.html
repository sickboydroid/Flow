<dialog data-dialog class="backdrop:bg-slate-900/60 rounded-2xl shadow-2xl w-full max-w-lg p-0 border-0 outline-none m-auto">
  <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-white">
    <h3 class="text-lg font-semibold text-slate-900">Visitor Details</h3>
    <button data-close class="cursor-pointer p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 rounded-lg transition-colors">
      <i data-lucide="x" class="w-5 h-5"></i>
    </button>
  </div>
  <div data-content class="p-6"></div>
</dialog>

<template data-body>
  <div class="flex items-center gap-4 mb-6">
    <div data-initials class="w-16 h-16 rounded-full bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white font-bold text-xl"></div>
    <div>
      <h4 data-name class="text-xl font-bold text-slate-900"></h4>
      <p data-dept class="text-sm text-slate-500 hidden"></p>
    </div>
  </div>
  <div data-fields class="grid grid-cols-2 gap-3 text-sm mb-6"></div>
  <button data-mark-out class="cursor-pointer w-full py-2.5 rounded-xl text-sm font-semibold text-white bg-amber-500 hover:bg-amber-600 transition-colors shadow hidden">
    Mark as Left
  </button>
</template>

<template data-field>
  <div class="bg-slate-50 rounded-xl px-4 py-3 border border-slate-100">
    <span data-label class="block text-[10px] uppercase tracking-wider text-slate-400 font-semibold mb-1"></span>
    <span data-value class="text-slate-700 font-medium"></span>
  </div>
</template>
