<dialog data-dialog class="backdrop:bg-slate-900/60 rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] p-0 border-0 outline-none m-auto open:flex open:flex-col overflow-hidden">
  <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-white shrink-0">
    <h3 class="text-lg font-semibold text-slate-900">Student Profile</h3>
    <button data-close class="cursor-pointer p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 rounded-lg transition-colors">
      <i data-lucide="x" class="w-5 h-5"></i>
    </button>
  </div>
  <div data-content class="flex flex-col overflow-y-auto flex-grow custom-scrollbar"></div>
</dialog>

<template data-skeleton>
  <div class="p-6 space-y-5 animate-pulse">
    <div class="flex gap-6">
      <div class="w-28 h-28 rounded-2xl bg-slate-200 shrink-0"></div>
      <div class="flex-1 space-y-3 pt-2">
        <div class="h-5 bg-slate-200 rounded w-2/3"></div>
        <div class="h-3.5 bg-slate-200 rounded w-1/3"></div>
      </div>
    </div>
    <div class="grid grid-cols-4 gap-3">
      <div class="h-16 bg-slate-200 rounded-xl"></div>
      <div class="h-16 bg-slate-200 rounded-xl"></div>
      <div class="h-16 bg-slate-200 rounded-xl"></div>
      <div class="h-16 bg-slate-200 rounded-xl"></div>
    </div>
    <div class="h-48 bg-slate-200 rounded-xl"></div>
  </div>
</template>

<template data-error>
  <div class="p-10 text-center text-red-400">Failed to load student info</div>
</template>

<template data-body>
  <div class="p-6 border-b border-slate-100 bg-white">
    <div class="flex gap-6 items-start">
      <img data-photo class="w-28 h-28 rounded-2xl object-cover shadow-md border-4 border-white ring-1 ring-slate-100" />
      <div class="flex-1 min-w-0">
        <h2 data-name class="text-2xl font-bold text-slate-900 font-outfit"></h2>
        <p data-enroll class="text-sm font-mono text-slate-400 mt-0.5"></p>
        <div data-fields class="mt-3 grid grid-cols-2 gap-x-6 gap-y-2 text-sm"></div>
      </div>
    </div>
  </div>
  <div class="px-6 py-3 border-b border-slate-100 bg-slate-50/60">
    <h4 class="text-xs uppercase tracking-widest text-slate-400 font-semibold mb-2">Activity Summary</h4>
    <div data-stats class="grid grid-cols-4 gap-2"></div>
  </div>
  <div class="flex flex-col flex-grow">
    <div class="px-6 pt-4 pb-2">
      <h4 class="text-xs uppercase tracking-widest text-slate-400 font-semibold">Log History</h4>
    </div>
    <div class="flex-grow overflow-auto">
      <table class="w-full text-left text-sm border-collapse">
        <thead class="bg-slate-50 text-slate-500 text-[11px] uppercase tracking-wider font-semibold sticky top-0 z-10">
          <tr>
            <th class="px-5 py-3">Date</th>
            <th class="px-5 py-3">Time</th>
            <th class="px-5 py-3">Type</th>
            <th class="px-5 py-3">Mode</th>
            <th class="px-5 py-3 text-right">Duration</th>
            <th class="px-5 py-3 text-center w-10"></th>
          </tr>
        </thead>
        <tbody data-logs></tbody>
      </table>
    </div>
    <div class="px-6 py-3 border-t border-slate-100 bg-white flex items-center justify-between shrink-0">
      <div class="flex items-center gap-2">
        <button data-prev class="cursor-pointer p-1.5 rounded-lg text-slate-400 hover:text-slate-800 hover:bg-slate-100 disabled:opacity-30 disabled:pointer-events-none transition-colors">
          <i data-lucide="arrow-left" class="w-4 h-4"></i>
        </button>
        <span data-page class="text-sm font-medium text-slate-600"></span>
        <button data-next class="cursor-pointer p-1.5 rounded-lg text-slate-400 hover:text-slate-800 hover:bg-slate-100 disabled:opacity-30 disabled:pointer-events-none transition-colors">
          <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>
      </div>
      <span data-total class="text-sm text-slate-400"></span>
    </div>
  </div>
</template>

<template data-field>
  <div>
    <span data-label class="text-xs uppercase tracking-wider text-slate-400 font-semibold block"></span>
    <span data-value class="font-medium text-slate-700"></span>
  </div>
</template>

<template data-stat>
  <div class="bg-white border border-slate-100 rounded-xl px-4 py-2.5">
    <span data-label class="text-[10px] uppercase tracking-wider font-semibold text-slate-400"></span>
    <span data-value class="text-base font-bold block leading-tight"></span>
    <span data-sub class="text-[10px] text-slate-400 hidden"></span>
  </div>
</template>

<template data-log-row>
  <tr class="border-b border-slate-100 even:bg-slate-50/50 hover:bg-slate-100/40 transition-colors">
    <td data-date class="px-5 py-3 text-sm text-slate-600 font-medium whitespace-nowrap"></td>
    <td data-time class="px-5 py-3 text-sm text-slate-500 whitespace-nowrap"></td>
    <td class="px-5 py-3"><span data-type class="inline-flex px-2.5 py-0.5 rounded-full text-xs font-semibold"></span></td>
    <td data-mode class="px-5 py-3 text-xs text-slate-400"></td>
    <td data-duration class="px-5 py-3 text-sm text-slate-400 text-right"></td>
    <td class="px-5 py-3 text-center">
      <button data-delete class="text-slate-300 hover:text-red-500 transition-colors p-1 rounded-md cursor-pointer">
        <i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i>
      </button>
    </td>
  </tr>
</template>

<template data-logs-empty>
  <tr><td colspan="6" class="py-10 text-center text-slate-400 italic text-sm">No logs found</td></tr>
</template>

<template data-logs-loading>
  <tr><td colspan="6" class="py-8 text-center"><div class="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"></div></td></tr>
</template>
