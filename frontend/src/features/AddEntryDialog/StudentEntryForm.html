<div class="p-6 space-y-4">
  <div class="relative">
    <label class="block text-sm font-medium text-slate-700 mb-1.5">Student Enrollment No.</label>
    <div class="relative">
      <input type="text" data-enroll autocomplete="off" class="w-full px-3 py-2.5 border border-slate-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 pr-9 transition-all text-sm" placeholder="e.g. 2025BCSE093">
      <div data-status-icon class="absolute right-3 top-1/2 -translate-y-1/2 hidden">
        <i data-lucide="loader-2" class="w-4 h-4 text-slate-400 animate-spin hidden" data-icon-checking></i>
        <i data-lucide="check" class="w-4 h-4 text-emerald-500 hidden" data-icon-valid></i>
        <i data-lucide="x" class="w-4 h-4 text-red-400 hidden" data-icon-invalid></i>
      </div>
    </div>
    <div data-hint class="hidden absolute z-30 w-full mt-1 bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden"></div>
  </div>
  <div data-preview class="hidden rounded-xl border border-slate-100 overflow-hidden bg-white shadow-sm min-h-[64px]"></div>
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1.5">Action</label>
    <div class="flex gap-2">
      <label class="flex-1 flex items-center justify-center gap-1 p-2.5 rounded-xl border-2 border-slate-200 cursor-pointer hover:border-emerald-400 has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-50 transition-all">
        <input type="radio" name="student-type" data-type="IN" class="text-emerald-600 focus:ring-emerald-500 hidden">
        <span class="text-sm font-medium text-slate-700">IN</span>
      </label>
      <label class="flex-1 flex items-center justify-center gap-1 p-2.5 rounded-xl border-2 border-slate-200 cursor-pointer hover:border-amber-400 has-[:checked]:border-amber-500 has-[:checked]:bg-amber-50 transition-all">
        <input type="radio" name="student-type" data-type="OUT" class="text-amber-600 focus:ring-amber-500 hidden">
        <span class="text-sm font-medium text-slate-700">OUT</span>
      </label>
      <label data-leave-label class="flex-1 flex items-center justify-center gap-1 p-2.5 rounded-xl border-2 border-slate-200 cursor-pointer hover:border-blue-400 has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50 transition-all opacity-40 pointer-events-none" title="Only for hostellers">
        <input type="radio" name="student-type" data-type="LEAVE" class="text-blue-600 focus:ring-blue-500 hidden">
        <span class="text-sm font-medium text-slate-700">LEAVE</span>
      </label>
    </div>
  </div>
  <button data-submit disabled class="w-full py-2.5 text-sm font-semibold text-white bg-blue-600 rounded-xl shadow hover:bg-blue-700 transition-colors disabled:opacity-40 disabled:pointer-events-none cursor-pointer">Add Student Entry</button>
</div>

<template data-preview-loading>
  <div class="flex items-center gap-3 p-3">
    <div class="w-10 h-10 rounded-full bg-slate-200 shrink-0 shimmer"></div>
    <div class="flex-1 space-y-2">
      <div class="h-3.5 bg-slate-200 rounded shimmer w-2/3"></div>
      <div class="h-3 bg-slate-200 rounded shimmer w-1/2"></div>
    </div>
  </div>
</template>

<template data-preview-invalid>
  <div class="flex items-center gap-3 p-3 bg-red-50">
    <div class="w-10 h-10 rounded-full bg-red-100 shrink-0 flex items-center justify-center">
      <i data-lucide="user-x" class="w-5 h-5 text-red-400"></i>
    </div>
    <div>
      <p class="text-sm font-semibold text-red-600">Not Found</p>
      <p class="text-xs text-red-400">No student with this enrollment</p>
    </div>
  </div>
</template>

<template data-preview-valid>
  <div class="flex items-center gap-3 p-3 bg-emerald-50">
    <div class="w-10 h-10 rounded-full overflow-hidden bg-slate-200 shrink-0">
      <img data-photo class="w-full h-full object-cover" />
    </div>
    <div class="min-w-0">
      <p data-name class="text-sm font-semibold text-slate-800 truncate"></p>
      <p data-meta class="text-xs text-slate-500"></p>
    </div>
  </div>
</template>
