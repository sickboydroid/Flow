<div class="p-6 space-y-4">
  <div class="relative">
    <label class="block text-sm font-medium text-slate-700 mb-1.5">Vehicle Plate <span class="text-slate-400 font-normal text-xs">(Indian format: MH 04 AB 1234)</span></label>
    <input type="text" data-plate autocomplete="off" class="w-full px-3 py-2.5 border border-slate-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm uppercase tracking-widest" placeholder="MH 04 AB 1234">
  </div>
  <div class="relative">
    <label class="block text-sm font-medium text-slate-700 mb-1.5">Type of Vehicle</label>
    <input type="text" data-type-input autocomplete="off" class="w-full px-3 py-2.5 border border-slate-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="e.g. Motorcycle, SUV, Truck...">
    <div data-type-hint class="hidden absolute z-30 w-full mt-1 bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden"></div>
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1.5">Direction</label>
    <div class="flex gap-3">
      <label class="flex-1 flex items-center gap-2 p-3 rounded-xl border-2 border-slate-200 cursor-pointer hover:border-emerald-400 has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-50 transition-all">
        <input type="radio" name="vehicle-type" data-direction="IN" checked class="text-emerald-600 focus:ring-emerald-500">
        <span class="text-sm font-medium text-slate-700">IN</span>
      </label>
      <label class="flex-1 flex items-center gap-2 p-3 rounded-xl border-2 border-slate-200 cursor-pointer hover:border-amber-400 has-[:checked]:border-amber-500 has-[:checked]:bg-amber-50 transition-all">
        <input type="radio" name="vehicle-type" data-direction="OUT" class="text-amber-600 focus:ring-amber-500">
        <span class="text-sm font-medium text-slate-700">OUT</span>
      </label>
    </div>
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1.5">Remarks <span class="text-slate-400 font-normal">(optional)</span></label>
    <input type="text" data-remarks class="w-full px-3 py-2.5 border border-slate-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Any notes...">
  </div>
  <button data-submit class="w-full py-2.5 text-sm font-semibold text-white bg-emerald-600 rounded-xl shadow hover:bg-emerald-700 transition-colors cursor-pointer">Add Vehicle Log</button>
</div>
