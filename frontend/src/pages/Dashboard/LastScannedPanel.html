<div class="px-5 py-4 border-b border-slate-100">
  <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500">Last Scanned</h2>
</div>
<div data-content class="flex-grow p-6 flex flex-col items-center justify-center text-center overflow-y-auto custom-scrollbar"></div>

<template data-empty>
  <div class="flex flex-col items-center text-slate-400 gap-3">
    <i data-lucide="user-x" class="w-12 h-12 opacity-50"></i>
    <p class="text-sm">No recent scans</p>
  </div>
</template>

<template data-card>
  <div class="flex flex-col items-center text-center w-full">
    <div class="relative mb-4">
      <img data-photo class="w-28 h-28 rounded-full object-cover shadow-md border-4 border-white ring-1 ring-slate-100" />
      <span data-status class="absolute -bottom-1 -right-1 px-2 py-0.5 text-[11px] font-bold uppercase tracking-wider rounded-full ring-1 shadow-sm"></span>
    </div>
    <h3 data-name class="text-xl font-bold text-slate-900 font-outfit mb-0.5"></h3>
    <p data-enroll class="text-xs font-mono text-slate-400 mb-4"></p>
    <div data-fields class="w-full max-w-sm grid grid-cols-2 gap-2 text-sm text-left mb-4"></div>
  </div>
</template>

<template data-field>
  <div class="bg-slate-50 rounded-xl px-3 py-2 border border-slate-100">
    <span data-label class="block text-[10px] uppercase tracking-wider text-slate-400 font-semibold mb-0.5"></span>
    <span data-value class="text-[13px] font-medium text-slate-700 truncate block"></span>
  </div>
</template>
