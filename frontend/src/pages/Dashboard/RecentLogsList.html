<div data-rows class="flex flex-col w-full"></div>

<template data-empty>
  <div class="flex justify-center items-center h-full text-slate-400">
    <div class="flex flex-col items-center gap-2 pt-10">
      <i data-lucide="history" class="w-8 h-8 opacity-50"></i>
      <p class="text-sm">No recent activity</p>
    </div>
  </div>
</template>

<template data-error>
  <div class="flex flex-col items-center text-red-400 gap-2 p-10">
    <p class="text-sm font-medium">Server not reachable</p>
    <p class="text-xs text-slate-400">Make sure the backend is running on port 5000.</p>
  </div>
</template>

<template data-row-student>
  <div class="log-row flex items-center justify-between p-3.5 border-b border-slate-100 hover:bg-slate-50 cursor-pointer even:bg-slate-50/60 transition-colors">
    <div class="flex items-center gap-3.5 overflow-hidden">
      <div class="w-11 h-11 rounded-full overflow-hidden bg-slate-200 shadow-sm shrink-0 ring-2 ring-slate-100/50">
        <img data-photo class="w-full h-full object-cover" />
      </div>
      <div class="min-w-0 flex flex-col justify-center">
        <div class="flex items-center gap-2 mb-0.5">
          <h4 data-name class="text-[15px] font-medium text-slate-800 truncate tracking-tight"></h4>
          <span data-status class="px-1.5 py-0.5 rounded-md text-[10px] font-bold uppercase tracking-wider"></span>
        </div>
        <div class="flex items-center gap-2 text-[11px] text-slate-400 font-medium">
          <span data-enroll class="font-mono tracking-wide"></span>
          <span data-gender class="px-1.5 py-0.5 rounded-md border border-slate-200 bg-white capitalize hidden"></span>
          <span data-role class="px-1.5 py-0.5 rounded-md border border-slate-200 bg-white"></span>
        </div>
      </div>
    </div>
    <div class="shrink-0 pl-3">
      <span data-since data-live-ts class="text-xs font-semibold text-slate-400"></span>
    </div>
  </div>
</template>

<template data-row-vehicle>
  <div class="log-row flex items-center justify-between p-3.5 border-b border-slate-100 hover:bg-slate-50 cursor-pointer even:bg-slate-50/60 transition-colors">
    <div class="flex items-center gap-3.5 overflow-hidden">
      <div class="w-11 h-11 rounded-full bg-slate-100 flex items-center justify-center shrink-0 ring-2 ring-slate-100/50">
        <i data-lucide="car" class="w-5 h-5 text-slate-500"></i>
      </div>
      <div class="min-w-0 flex flex-col justify-center">
        <div class="flex items-center gap-2 mb-0.5">
          <h4 data-plate class="text-[15px] font-mono font-bold text-slate-800 truncate tracking-tight"></h4>
          <span data-direction class="px-1.5 py-0.5 rounded-md text-[10px] font-semibold"></span>
        </div>
        <div class="flex items-center gap-2 text-[11px] text-slate-400 font-medium">
          <span data-vehicle-type class="truncate"></span>
        </div>
      </div>
    </div>
    <div class="shrink-0 pl-3">
      <span data-since data-live-ts class="text-xs font-semibold text-slate-400"></span>
    </div>
  </div>
</template>

<template data-row-visitor>
  <div class="log-row flex items-center justify-between p-3.5 border-b border-slate-100 hover:bg-slate-50 cursor-pointer even:bg-slate-50/60 transition-colors">
    <div class="flex items-center gap-3.5 overflow-hidden">
      <div data-initials class="w-11 h-11 rounded-full bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white font-bold text-sm shrink-0 ring-2 ring-slate-100/50"></div>
      <div class="min-w-0 flex flex-col justify-center">
        <div class="flex items-center gap-2 mb-0.5">
          <h4 data-name class="text-[15px] font-medium text-slate-800 truncate tracking-tight"></h4>
          <span data-state class="px-1.5 py-0.5 rounded-md text-[10px] font-semibold"></span>
        </div>
        <div class="flex items-center gap-2 text-[11px] text-slate-400 font-medium">
          <span data-dept class="truncate"></span>
        </div>
      </div>
    </div>
    <div class="shrink-0 pl-3">
      <span data-since data-live-ts class="text-xs font-semibold text-slate-400"></span>
    </div>
  </div>
</template>
