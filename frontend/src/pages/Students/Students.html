<div class="p-4 border-b border-slate-100 flex flex-wrap gap-4 items-center justify-between bg-slate-50 z-10 w-full relative">
  <div data-slot="search" class="relative w-full md:w-72"></div>
  <div class="flex flex-wrap items-center gap-4 flex-grow md:justify-end">
    <div data-slot="filter-roles"></div>
    <div data-slot="filter-genders"></div>
    <div data-slot="filter-statuses"></div>
  </div>
</div>
<div class="flex-grow min-h-0 overflow-y-auto w-full custom-scrollbar relative">
  <table class="w-full text-left border-collapse text-sm whitespace-nowrap min-w-[700px]">
    <thead class="sticky top-0 bg-white shadow-sm z-10 text-slate-500 uppercase tracking-wider text-[11px] font-semibold">
      <tr>
        <th class="py-3 px-4 w-12 text-center"></th>
        <th class="py-3 px-4 text-blue-600/80">Enrollment</th>
        <th class="py-3 px-4 text-blue-600/80">Name</th>
        <th class="py-3 px-4 text-blue-600/80">Gender</th>
        <th class="py-3 px-4 text-blue-600/80">Status</th>
        <th class="py-3 px-4 text-blue-600/80 text-right">Time Since</th>
      </tr>
    </thead>
    <tbody data-table-body class="divide-y divide-slate-100"></tbody>
  </table>
  <div data-loading class="hidden absolute inset-0 bg-white/70 backdrop-blur-sm z-20 flex items-center justify-center">
    <i data-lucide="loader-2" class="w-8 h-8 text-blue-500 animate-spin"></i>
  </div>
</div>
<div data-slot="pagination" class="p-3 border-t border-slate-100 bg-white flex justify-between items-center text-sm shrink-0"></div>

<template data-row>
  <tr class="even:bg-slate-50 border-b border-slate-100 hover:bg-slate-100/50 cursor-pointer transition-colors">
    <td class="py-3 px-4">
      <div class="w-8 h-8 rounded-full overflow-hidden bg-slate-200 shadow-sm mx-auto">
        <img data-photo class="w-full h-full object-cover" />
      </div>
    </td>
    <td data-enroll class="py-3 px-4 font-mono text-[13px] text-slate-500"></td>
    <td data-name class="py-3 px-4 font-medium text-slate-800"></td>
    <td data-gender class="py-3 px-4 text-slate-500 capitalize"></td>
    <td class="py-3 px-4">
      <span data-status class="inline-flex px-2.5 py-0.5 rounded-full text-xs font-bold uppercase tracking-wider ring-1"></span>
    </td>
    <td data-since class="py-3 px-4 text-right text-slate-500 font-medium"></td>
  </tr>
</template>

<template data-empty>
  <tr><td colspan="6" class="p-8 text-center text-slate-400 italic">No students match the filters.</td></tr>
</template>

<template data-error>
  <tr><td colspan="6" class="p-8 text-center text-red-500">Failed to load data.</td></tr>
</template>
